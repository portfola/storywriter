<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Writer - Create Your Superhero Story!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Story Writer</h1>
    </header>

    <main>
        <section id="question-area">
            <h2>Let's create your story!</h2>
            <div id="question-display"></div>
            <input type="text" id="user-input" placeholder="Type your answer here">
            <button id="submit-answer">Submit</button>
            <button id="voice-input-btn">Voice Input</button>
        </section>

        <section id="story-display" style="display: none;">
            <div id="story-content"></div>
            <div id="story-controls">
                <button id="prev-page">Previous Page</button>
                <button id="next-page">Next Page</button>
            </div>
        </section>

        <section id="speech-controls">
            <label for="speech-rate">Speech Rate:</label>
            <input type="range" id="speech-rate" min="0.5" max="2" step="0.1" value="1">
            <label for="speech-volume">Speech Volume:</label>
            <input type="range" id="speech-volume" min="0" max="1" step="0.1" value="1">
        </section>

        <section id="story-management">
            <button id="save-story">Save Story</button>
            <button id="load-stories">Load Stories</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Story Writer App</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
